<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wielki Test Mno?enia do 100</title>
    <!-- Tailwind CSS do stylizacji -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Czcionka Nunito dla przyjaznego, dzieci?cego wygl?du -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Nunito', sans-serif;
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Style dla przycisków opcji */
        .option-btn {
            transition: all 0.2s ease-in-out;
        }
        .option-btn:active:not(:disabled) {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 flex flex-col items-center justify-center p-4 sm:p-6 lg:p-8">

    <!-- KONTENER APLIKACJI -->
    <div id="app-container" class="w-full max-w-2xl mx-auto">

        <!-- ================= EKRAN STARTOWY ================= -->
        <div id="screen-start" class="bg-white rounded-3xl shadow-xl overflow-hidden text-center p-8 border-4 border-indigo-100 relative">
            <div class="absolute top-4 right-4 text-amber-400">
                <i data-lucide="sparkles" class="w-8 h-8"></i>
            </div>
            <div class="w-24 h-24 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="trophy" class="w-12 h-12 text-indigo-600"></i>
            </div>
            <h1 class="text-4xl sm:text-5xl font-black text-slate-800 mb-4 tracking-tight">Wielki Test Mno?enia do 100!</h1>
            <p class="text-slate-600 mb-8 text-lg font-medium">
                Przed Tob? zestaw <strong class="text-indigo-600">50 unikalnych, losowych pyta?</strong>. 
                Gotowy, by zosta? Mistrzem Matematyki?
            </p>
            <button onclick="startQuiz()" class="w-full py-5 px-6 bg-indigo-600 hover:bg-indigo-700 text-white text-2xl font-black rounded-2xl shadow-lg transform transition active:scale-95 flex items-center justify-center gap-3">
                <i data-lucide="play" class="w-7 h-7 fill-current"></i>
                Rozpocznij Gr?
            </button>
        </div>

        <!-- ================= EKRAN QUIZU ================= -->
        <div id="screen-quiz" class="hidden flex-col w-full">
            
            <!-- Header i pasek post?pu -->
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-4 flex-1">
                    <span id="progress-text" class="text-sm font-bold text-indigo-700 bg-indigo-100 px-4 py-2 rounded-full shadow-sm whitespace-nowrap">
                        1 z 50
                    </span>
                    <div class="h-4 flex-1 bg-slate-200 rounded-full overflow-hidden shadow-inner relative">
                        <div id="progress-bar" class="h-full bg-gradient-to-r from-indigo-400 to-indigo-600 transition-all duration-300 ease-out" style="width: 0%;"></div>
                    </div>
                </div>
                <button onclick="startQuiz()" class="ml-4 p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-full transition-colors flex items-center gap-2 text-sm font-bold" title="Rozpocznij nowy quiz">
                    <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                    <span class="hidden sm:inline">Reset</span>
                </button>
            </div>

            <!-- Karta Pytania -->
            <div class="bg-white rounded-3xl shadow-xl p-6 sm:p-12 mb-6 border-b-8 border-slate-200">
                <h2 id="question-text" class="text-3xl sm:text-5xl font-black text-slate-800 mb-10 text-center leading-tight tracking-tight">
                    Ile to jest X × Y?
                </h2>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="options-container">
                    <!-- Przyciski odpowiedzi (uzupe?niane przez JS) -->
                    <button class="option-btn py-6 px-6 text-3xl font-black rounded-2xl border-4 border-slate-200 bg-white text-slate-700 hover:border-indigo-400 hover:bg-indigo-50 hover:shadow-md flex justify-center items-center gap-3" onclick="handleAnswer(0)">
                        <span id="opt-0">A</span>
                        <i id="icon-opt-0" class="w-8 h-8 hidden"></i>
                    </button>
                    <button class="option-btn py-6 px-6 text-3xl font-black rounded-2xl border-4 border-slate-200 bg-white text-slate-700 hover:border-indigo-400 hover:bg-indigo-50 hover:shadow-md flex justify-center items-center gap-3" onclick="handleAnswer(1)">
                        <span id="opt-1">B</span>
                        <i id="icon-opt-1" class="w-8 h-8 hidden"></i>
                    </button>
                    <button class="option-btn py-6 px-6 text-3xl font-black rounded-2xl border-4 border-slate-200 bg-white text-slate-700 hover:border-indigo-400 hover:bg-indigo-50 hover:shadow-md flex justify-center items-center gap-3" onclick="handleAnswer(2)">
                        <span id="opt-2">C</span>
                        <i id="icon-opt-2" class="w-8 h-8 hidden"></i>
                    </button>
                    <button class="option-btn py-6 px-6 text-3xl font-black rounded-2xl border-4 border-slate-200 bg-white text-slate-700 hover:border-indigo-400 hover:bg-indigo-50 hover:shadow-md flex justify-center items-center gap-3" onclick="handleAnswer(3)">
                        <span id="opt-3">D</span>
                        <i id="icon-opt-3" class="w-8 h-8 hidden"></i>
                    </button>
                </div>
            </div>

            <!-- Sekcja Werdyktu -->
            <div id="verdict-section" class="hidden animate-fade-in-up mt-6">
                <div id="verdict-box" class="rounded-2xl p-6 mb-6 border-l-8 shadow-sm">
                    <h3 id="verdict-title" class="text-xl font-black mb-2 flex items-center gap-3">
                        <!-- Tytu? werdyktu -->
                    </h3>
                    <p id="verdict-rationale" class="font-semibold text-lg opacity-90">
                        <!-- Wyja?nienie -->
                    </p>
                </div>
                
                <button id="next-btn" onclick="handleNextQuestion()" class="w-full py-5 bg-slate-800 hover:bg-indigo-600 text-white font-black text-xl rounded-2xl shadow-xl flex items-center justify-center gap-3 transition-colors transform active:scale-95">
                    <span id="next-btn-text">Nast?pne Pytanie</span>
                    <i data-lucide="arrow-right" class="w-6 h-6"></i>
                </button>
            </div>

            <!-- Sekcja Wskazówek -->
            <div id="hint-section" class="text-center mt-6 min-h-[64px]">
                <button id="hint-btn" onclick="showHint()" class="inline-flex items-center gap-2 text-slate-500 font-bold hover:text-indigo-600 bg-white hover:bg-indigo-50 px-6 py-3 rounded-full shadow-sm transition-all border border-slate-200">
                    <i data-lucide="lightbulb" class="w-5 h-5 text-amber-500"></i>
                    Potrzebujesz podpowiedzi?
                </button>
                <div id="hint-text-box" class="hidden inline-block bg-amber-50 text-amber-900 px-6 py-4 rounded-2xl border-2 border-amber-200 animate-fade-in text-base shadow-sm">
                    <span class="font-black text-amber-600 mr-2 uppercase tracking-wide">Wskazówka:</span>
                    <span id="hint-text" class="font-medium"></span>
                </div>
            </div>

        </div>

        <!-- ================= EKRAN KO?COWY ================= -->
        <div id="screen-end" class="hidden bg-white rounded-3xl shadow-xl overflow-hidden text-center p-8 border-4 border-indigo-100">
            <div class="flex justify-center gap-2 mb-6" id="stars-container">
                <!-- Gwiazdki generowane przez JS -->
            </div>
            <h2 class="text-3xl font-bold text-slate-800 mb-2">Koniec Wyzwania!</h2>
            <div class="text-7xl font-black text-indigo-600 mb-4 mt-4">
                <span id="final-score">0</span> <span class="text-3xl text-slate-400">/ 50</span>
            </div>
            <p id="final-message" class="text-xl text-slate-600 mb-8 font-bold"></p>
            
            <button onclick="startQuiz()" class="w-full py-5 px-6 bg-emerald-500 hover:bg-emerald-600 text-white text-xl font-bold rounded-2xl shadow-lg transform transition active:scale-95 flex items-center justify-center gap-3">
                <i data-lucide="rotate-ccw" class="w-6 h-6"></i>
                Zagraj Ponownie (Nowe pytania)
            </button>
        </div>

    </div>

    <!-- SKRYPTY LOGIKI GRY -->
    <script>
        // Inicjalizacja ikon Lucide
        lucide.createIcons();

        const TOTAL_QUESTIONS = 50;
        let questions = [];
        let currentQIndex = 0;
        let score = 0;
        let isAnswered = false;
        let selectedOption = null;

        // --- GENERATOR PYTA? ---
        function generateQuizQuestions(count) {
            const allCombinations = [];
            for (let a = 0; a <= 10; a++) {
                for (let b = 0; b <= 10; b++) {
                    allCombinations.push([a, b]);
                }
            }

            // Tasowanie kombinacji (algorytm Fisher-Yates)
            for (let i = allCombinations.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [allCombinations[i], allCombinations[j]] = [allCombinations[j], allCombinations[i]];
            }

            const selectedPairs = allCombinations.slice(0, count);

            return selectedPairs.map(([a, b]) => {
                const correctResult = a * b;
                const wrongOptions = new Set();

                // Inteligentne b??dne odpowiedzi
                if ((a + 1) * b !== correctResult) wrongOptions.add((a + 1) * b);
                if (a * (b + 1) !== correctResult) wrongOptions.add(a * (b + 1));
                if (a > 0 && (a - 1) * b !== correctResult) wrongOptions.add((a - 1) * b);
                if (b > 0 && a * (b - 1) !== correctResult) wrongOptions.add(a * (b - 1));
                if (a + b !== correctResult) wrongOptions.add(a + b); 

                let wrongArr = Array.from(wrongOptions).sort(() => 0.5 - Math.random()).slice(0, 3);

                // Uzupe?nienie losowymi warto?ciami je?li brakuje opcji
                while (wrongArr.length < 3) {
                    const randomOffset = Math.floor(Math.random() * 11) - 5;
                    const randomFake = Math.max(0, correctResult + randomOffset);
                    if (randomFake !== correctResult && !wrongArr.includes(randomFake)) {
                        wrongArr.push(randomFake);
                    }
                }

                // Dodanie poprawnej odpowiedzi i tasowanie finalnej listy
                const finalOptions = [...wrongArr, correctResult].sort(() => 0.5 - Math.random());
                const correctIndex = finalOptions.indexOf(correctResult);

                // Dynamiczne wskazówki
                let dynamicHint = "";
                if (a === 0 || b === 0) dynamicHint = "Pami?taj, jakakolwiek liczba pomno?ona przez zero staje si? zerem!";
                else if (a === 1 || b === 1) dynamicHint = "Mno?enie przez 1 dzia?a jak lustro - liczba zostaje taka sama.";
                else if (a === 2 || b === 2) dynamicHint = `To po prostu podwojenie! Dodaj do siebie ${a === 2 ? b : a} + ${a === 2 ? b : a}.`;
                else if (a === 5 || b === 5) dynamicHint = "Skacz co pi??! Wyobra? sobie minuty na tarczy zegara.";
                else if (a === 9) dynamicHint = `Dla dziewi?tek: wynik to o ${b} mniej ni? 10 × ${b} (czyli ${10 * b}).`;
                else if (b === 9) dynamicHint = `Dla dziewi?tek: wynik to o ${a} mniej ni? 10 × ${a} (czyli ${10 * a}).`;
                else if (a === 10 || b === 10) dynamicHint = "Mno?enie przez 10 jest proste - po prostu dopisz zero na ko?cu mniejszej liczby!";
                else dynamicHint = `Wyobra? sobie ${a} grupy. W ka?dej z nich jest dok?adnie ${b} elementów. Ile ich jest razem?`;

                const questionTextVariants = [
                    `Ile to jest ${a} × ${b}?`,
                    `Oblicz: ${a} × ${b} = ?`,
                    `Rozwi?? dzia?anie: ${a} × ${b}`
                ];
                const qText = questionTextVariants[Math.floor(Math.random() * questionTextVariants.length)];

                return {
                    question: qText,
                    options: finalOptions.map(String),
                    correctIndex: correctIndex,
                    rationale: `Poprawny wynik dzia?ania ${a} × ${b} to ${correctResult}.`,
                    hint: dynamicHint
                };
            });
        }

        // --- STEROWANIE EKRANAMI ---
        function showScreen(screenId) {
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-quiz').classList.add('hidden');
            document.getElementById('screen-end').classList.add('hidden');
            
            // Flex dla ekranu quizu (zamiast block) dla lepszego uk?adu
            if (screenId === 'screen-quiz') {
                document.getElementById(screenId).classList.remove('hidden');
                document.getElementById(screenId).style.display = 'flex';
            } else {
                document.getElementById(screenId).style.display = '';
                document.getElementById(screenId).classList.remove('hidden');
            }
        }

        function startQuiz() {
            questions = generateQuizQuestions(TOTAL_QUESTIONS);
            currentQIndex = 0;
            score = 0;
            showScreen('screen-quiz');
            loadQuestion();
        }

        function loadQuestion() {
            isAnswered = false;
            selectedOption = null;
            const q = questions[currentQIndex];

            // Aktualizacja tekstów
            document.getElementById('question-text').textContent = q.question;
            document.getElementById('progress-text').textContent = `${currentQIndex + 1} z ${TOTAL_QUESTIONS}`;
            document.getElementById('progress-bar').style.width = `${((currentQIndex + 1) / TOTAL_QUESTIONS) * 100}%`;
            document.getElementById('hint-text').textContent = q.hint;

            // Ustawienia opcji
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach((btn, idx) => {
                btn.disabled = false;
                // Resetowanie klas
                btn.className = "option-btn py-6 px-6 text-3xl font-black rounded-2xl border-4 border-slate-200 bg-white text-slate-700 hover:border-indigo-400 hover:bg-indigo-50 hover:shadow-md flex justify-center items-center gap-3";
                document.getElementById(`opt-${idx}`).textContent = q.options[idx];
                
                // Resetowanie ikon w przyciskach
                const iconContainer = document.getElementById(`icon-opt-${idx}`);
                iconContainer.innerHTML = '';
                iconContainer.classList.add('hidden');
            });

            // Ukrywanie sekcji werdyktu i reset hintów
            document.getElementById('verdict-section').classList.add('hidden');
            document.getElementById('hint-btn').classList.remove('hidden');
            document.getElementById('hint-text-box').classList.add('hidden');

            // Aktualizacja napisu na przycisku "Nast?pne"
            document.getElementById('next-btn-text').textContent = currentQIndex < TOTAL_QUESTIONS - 1 ? 'Nast?pne Pytanie' : 'Zako?cz Quiz';
            
            lucide.createIcons();
        }

        function showHint() {
            document.getElementById('hint-btn').classList.add('hidden');
            document.getElementById('hint-text-box').classList.remove('hidden');
        }

        function handleAnswer(index) {
            if (isAnswered) return;
            isAnswered = true;
            selectedOption = index;
            const q = questions[currentQIndex];

            if (index === q.correctIndex) {
                score++;
            }

            // Zmiana styli przycisków
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach((btn, idx) => {
                btn.disabled = true;
                const iconContainer = document.getElementById(`icon-opt-${idx}`);
                iconContainer.classList.remove('hidden');

                if (idx === q.correctIndex) {
                    btn.className = "option-btn py-6 px-6 text-3xl font-black rounded-2xl border-4 border-emerald-500 bg-emerald-50 text-emerald-600 scale-105 shadow-lg flex justify-center items-center gap-3";
                    iconContainer.innerHTML = '<i data-lucide="check-circle-2" class="w-8 h-8 text-emerald-500"></i>';
                } else if (idx === selectedOption) {
                    btn.className = "option-btn py-6 px-6 text-3xl font-black rounded-2xl border-4 border-rose-400 bg-rose-50 text-rose-600 opacity-50 flex justify-center items-center gap-3";
                    iconContainer.innerHTML = '<i data-lucide="x-circle" class="w-8 h-8 text-rose-500"></i>';
                } else {
                    btn.className = "option-btn py-6 px-6 text-3xl font-black rounded-2xl border-4 border-slate-100 bg-slate-50 text-slate-300 opacity-50 flex justify-center items-center gap-3";
                }
            });

            // Budowanie werdyktu
            const verdictBox = document.getElementById('verdict-box');
            const verdictTitle = document.getElementById('verdict-title');
            
            if (selectedOption === q.correctIndex) {
                verdictBox.className = "rounded-2xl p-6 mb-6 border-l-8 shadow-sm bg-emerald-50 border-emerald-500 text-emerald-800";
                verdictTitle.innerHTML = '<i data-lucide="check-circle-2" class="w-6 h-6"></i> Wspaniale! Dok?adnie tak!';
            } else {
                verdictBox.className = "rounded-2xl p-6 mb-6 border-l-8 shadow-sm bg-rose-50 border-rose-500 text-rose-800";
                verdictTitle.innerHTML = '<i data-lucide="x-circle" class="w-6 h-6"></i> Niestety, to nie to.';
            }

            document.getElementById('verdict-rationale').textContent = q.rationale;
            
            // Pokazanie werdyktu i ukrycie wskazówki
            document.getElementById('verdict-section').classList.remove('hidden');
            document.getElementById('hint-section').classList.add('hidden');

            // Renderowanie ikon wrzuconych dynamicznie do innerHTML
            lucide.createIcons();
        }

        function handleNextQuestion() {
            if (currentQIndex < TOTAL_QUESTIONS - 1) {
                currentQIndex++;
                document.getElementById('hint-section').classList.remove('hidden');
                loadQuestion();
            } else {
                finishQuiz();
            }
        }

        function finishQuiz() {
            showScreen('screen-end');
            document.getElementById('final-score').textContent = score;
            
            const percentage = Math.round((score / TOTAL_QUESTIONS) * 100);
            let message = "";
            if (percentage === 100) message = "Genialnie! Jeste? mistrzem tabliczki mno?enia! Czysta perfekcja!";
            else if (percentage >= 80) message = "Wspania?y wynik! ?wietnie opanowa?e? ten materia?.";
            else if (percentage >= 50) message = "Dobra robota! Trening przynosi efekty. Oby tak dalej!";
            else message = "Trening czyni mistrza. Spróbuj rozwi?za? losowy quiz jeszcze raz!";
            
            document.getElementById('final-message').textContent = message;

            // Generowanie gwiazdek
            const starsContainer = document.getElementById('stars-container');
            starsContainer.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                const isGold = i < Math.ceil(percentage / 20);
                const starColorClass = isGold ? 'text-yellow-400 fill-current' : 'text-slate-200';
                starsContainer.innerHTML += `<i data-lucide="star" class="w-10 h-10 ${starColorClass}"></i>`;
            }
            lucide.createIcons();
        }

    </script>
</body>
</html>
